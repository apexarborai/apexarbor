<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Arbor — We'll Be Back Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #080808;
      color: #F0EDE6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Background: subtle radial glow */
    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 900px;
      height: 700px;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Background: fine dot grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(201,168,76,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
      padding: 32px 24px;
      animation: fade-up 1s ease-out both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo image */
    .logo-img {
      width: auto;
      height: 64px;
      object-fit: contain;
      margin-bottom: 56px;
      opacity: 0.95;
    }

    /* Thin horizontal rule */
    .rule {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.6), transparent);
      margin-bottom: 40px;
    }

    /* Headline */
    h1 {
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #F0EDE6;
      margin-bottom: 18px;
      line-height: 1.3;
    }

    /* Subtext */
    p {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(240, 237, 230, 0.45);
      line-height: 1.8;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 28px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(138, 129, 120, 0.35);
      z-index: 1;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .logo-img { height: 48px; margin-bottom: 44px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="container">
    <img class="logo-img" src="images/apex logo white_.png" alt="Apex Arbor" />
    <div class="rule"></div>
    <h1>Under Upgrade</h1>
    <p>We'll be back shortly.<br/>Thank you for your patience.</p>
  </div>

  <footer>© 2025 Apex Arbor Holding Limited</footer>

</body>
</html>
